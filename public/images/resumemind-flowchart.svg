<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2250" viewBox="0 0 1400 2250" role="img" aria-labelledby="title desc">
  <title id="title">ResumeMind User Flowchart</title>
  <desc id="desc">Flowchart showing authentication, upload, AI analysis, and feedback rendering flow in ResumeMind.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f2937" />
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, sans-serif; fill: #334155; }
      .label { font: 600 20px Arial, sans-serif; fill: #0f172a; }
      .small { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .node { fill: #eef2ff; stroke: #4338ca; stroke-width: 2.2; rx: 14; }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.2; }
      .terminal { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.2; rx: 14; }
      .line { stroke: #1f2937; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .tag { font: 700 15px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="2250" fill="#f8fafc" />
  <text x="700" y="60" text-anchor="middle" class="title">ResumeMind User Flow</text>
  <text x="700" y="90" text-anchor="middle" class="sub">Auth -> Upload -> AI Analysis -> Review Dashboard</text>

  <!-- Nodes -->
  <rect class="terminal" x="420" y="130" width="560" height="70" />
  <text class="label" x="700" y="174" text-anchor="middle">Open ResumeMind</text>

  <polygon class="decision" points="700,240 860,330 700,420 540,330" />
  <text class="label" x="700" y="322" text-anchor="middle">Authenticated in Puter?</text>

  <rect class="node" x="80" y="470" width="470" height="80" />
  <text class="label" x="315" y="520" text-anchor="middle">Go to /auth and sign in</text>

  <rect class="node" x="850" y="470" width="470" height="80" />
  <text class="label" x="1085" y="520" text-anchor="middle">Home dashboard</text>

  <rect class="node" x="420" y="640" width="560" height="78" />
  <text class="label" x="700" y="688" text-anchor="middle">Go to /upload</text>

  <rect class="node" x="420" y="760" width="560" height="78" />
  <text class="label" x="700" y="803" text-anchor="middle">Enter company, role, and job description</text>

  <rect class="node" x="420" y="880" width="560" height="78" />
  <text class="label" x="700" y="926" text-anchor="middle">Upload PDF resume</text>

  <rect class="node" x="420" y="1000" width="560" height="78" />
  <text class="label" x="700" y="1046" text-anchor="middle">Store PDF in Puter FS</text>

  <rect class="node" x="420" y="1120" width="560" height="78" />
  <text class="label" x="700" y="1166" text-anchor="middle">Convert first PDF page to PNG</text>

  <rect class="node" x="420" y="1240" width="560" height="78" />
  <text class="label" x="700" y="1286" text-anchor="middle">Store PNG in Puter FS</text>

  <rect class="node" x="420" y="1360" width="560" height="78" />
  <text class="label" x="700" y="1406" text-anchor="middle">Create initial record in Puter KV</text>

  <rect class="node" x="420" y="1480" width="560" height="96" />
  <text class="label" x="700" y="1520" text-anchor="middle">Send PDF + ATS prompt</text>
  <text class="label" x="700" y="1550" text-anchor="middle">to Puter AI</text>

  <rect class="node" x="420" y="1618" width="560" height="78" />
  <text class="label" x="700" y="1664" text-anchor="middle">Receive structured JSON feedback</text>

  <rect class="node" x="420" y="1738" width="560" height="78" />
  <text class="label" x="700" y="1784" text-anchor="middle">Update record in Puter KV</text>

  <rect class="node" x="420" y="1858" width="560" height="78" />
  <text class="label" x="700" y="1904" text-anchor="middle">Redirect to /resume/:id</text>

  <rect class="node" x="420" y="1978" width="560" height="96" />
  <text class="label" x="700" y="2018" text-anchor="middle">Render summary, ATS score,</text>
  <text class="label" x="700" y="2048" text-anchor="middle">and detailed tips</text>

  <rect class="terminal" x="420" y="2116" width="560" height="78" />
  <text class="label" x="700" y="2162" text-anchor="middle">Resume card appears on home dashboard</text>

  <!-- Connectors -->
  <line class="line" x1="700" y1="200" x2="700" y2="238" />

  <polyline class="line" points="620,375 315,375 315,468" />
  <text class="tag" x="470" y="365" text-anchor="middle">No</text>

  <polyline class="line" points="780,375 1085,375 1085,468" />
  <text class="tag" x="930" y="365" text-anchor="middle">Yes</text>

  <line class="line" x1="550" y1="510" x2="848" y2="510" />

  <polyline class="line" points="1085,550 1085,610 700,610 700,638" />
  <line class="line" x1="700" y1="718" x2="700" y2="758" />
  <line class="line" x1="700" y1="838" x2="700" y2="878" />
  <line class="line" x1="700" y1="958" x2="700" y2="998" />
  <line class="line" x1="700" y1="1078" x2="700" y2="1118" />
  <line class="line" x1="700" y1="1198" x2="700" y2="1238" />
  <line class="line" x1="700" y1="1318" x2="700" y2="1358" />
  <line class="line" x1="700" y1="1438" x2="700" y2="1478" />
  <line class="line" x1="700" y1="1576" x2="700" y2="1616" />
  <line class="line" x1="700" y1="1696" x2="700" y2="1736" />
  <line class="line" x1="700" y1="1816" x2="700" y2="1856" />
  <line class="line" x1="700" y1="1936" x2="700" y2="1976" />
  <line class="line" x1="700" y1="2074" x2="700" y2="2114" />
</svg>
